# 与《实施规划》Phase 2 BOM 一致；bootstrap_servers 请改为实际 Kafka 内网地址。
binance:
  ws_base_url: "wss://stream.binance.com:9443/stream"
  symbols:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - SOLUSDT
    - XRPUSDT
    - DOGEUSDT
    - ADAUSDT
    - AVAXUSDT
    - LINKUSDT
    - DOTUSDT
    - MATICUSDT
    - UNIUSDT
    - LTCUSDT
    - ATOMUSDT
    - XLMUSDT
    - ETCUSDT
    - ALGOUSDT
    - VETUSDT
    - FILUSDT
    - TRXUSDT
    - NEARUSDT
    - APTUSDT
    - ARBUSDT
    - OPUSDT
    - INJUSDT
    - SUIUSDT
    - SEIUSDT
    - TIAUSDT
    - WLDUSDT
    - JUPUSDT
    - BCHUSDT
    - 1000PEPEUSDT
    - SHIBUSDT
    - HBARUSDT
    - ICPUSDT
    - LDOUSDT
    - PENDLEUSDT
    - STXUSDT
    - IMXUSDT
    - RENDERUSDT
    - FETUSDT
    - AAVEUSDT
    - MKRUSDT
    - GRTUSDT
    - SANDUSDT
    - MANAUSDT
    - THETAUSDT
    - EGLDUSDT
    - AXSUSDT
    - CRVUSDT
  streams:
    - trade
    - depth100ms
  max_streams_per_conn: 200
  reconnect_delay_base: 5
  reconnect_delay_max: 60
  ping_interval: 20

kafka:
  bootstrap_servers: "192.168.1.10:9092"
  topic_trade: "binance.trade.raw"
  topic_depth: "binance.depth.raw"
  batch_size: 32768
  linger_ms: 50
  compression_type: "lz4"
